name: Linting and formatting validation using ruff

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install -U pip
          pip install -e ".[dev]"
      - name: Lint and check formatting with ruff
        run: |
          ruff check .
          ruff format --check .
      - name: Type check project packages
        run: mypy truthexpiry adapters listeners agent
