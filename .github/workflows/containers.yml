name: Container build smoke

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - name: Build Slack worker image
        run: docker build -f Dockerfile -t truthexpiry-worker:ci .

      - name: Build lifecycle MCP image
        run: docker build -f Dockerfile.lifecycle-mcp -t truthexpiry-lifecycle-mcp:ci .

      - name: Worker structural check in container
        run: docker run --rm truthexpiry-worker:ci --check

      - name: Verify worker package is non-editable
        run: |
          docker run --rm --entrypoint python truthexpiry-worker:ci -c "import importlib.metadata as m; loc=m.distribution('truthexpiry').locate_file(''); assert '.egg-link' not in str(loc); print('non-editable:', loc)"

      - name: MCP structural check in container
        run: |
          docker run --rm \
            -e TRUTH_EXPIRY_LIFECYCLE_MCP_AUTH_DISABLED=1 \
            truthexpiry-lifecycle-mcp:ci \
            --check

      - name: MCP health endpoints in container
        run: |
          cid=$(docker run -d \
            -e TRUTH_EXPIRY_LIFECYCLE_MCP_AUTH_DISABLED=1 \
            -e TRUTH_EXPIRY_LIFECYCLE_MCP_HOST=0.0.0.0 \
            -p 18001:8001 \
            truthexpiry-lifecycle-mcp:ci)
          cleanup() { docker rm -f "$cid"; }
          trap cleanup EXIT
          for attempt in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18001/readyz | grep -Eq '"status"[[:space:]]*:[[:space:]]*"ok"'; then
              curl -sf http://127.0.0.1:18001/healthz | grep -Eq '"status"[[:space:]]*:[[:space:]]*"ok"'
              exit 0
            fi
            sleep 1
          done
          docker logs "$cid"
          exit 1

      - name: Verify non-root user in worker image
        run: |
          uid=$(docker run --rm --entrypoint id truthexpiry-worker:ci -u)
          test "$uid" = "10001"

      - name: Verify non-root user in MCP image
        run: |
          uid=$(docker run --rm --entrypoint id truthexpiry-lifecycle-mcp:ci -u)
          test "$uid" = "10001"
