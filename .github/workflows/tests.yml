name: Run all the unit tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7
      - name: Verify canonical lifecycle dataset is tracked
        run: git ls-files --error-unmatch lifecycle_mcp/data/lifecycle_records.json
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install -U pip
          pip install -e ".[dev]"
      - name: Run all tests
        env:
          TRUTH_EXPIRY_USE_FAKES: "1"
        run: pytest -q
